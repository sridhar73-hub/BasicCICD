name: CI Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Debug - List files
        run: ls -la

      - name: Fix line endings & Run CICD Script
        run: |
          sed -i 's/\r//' ./CICD.sh
          chmod +x ./CICD.sh
          bash -x ./CICD.sh

      - name: Publish Testsigma Test Results
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: '**/junit-report-*.xml'
          fail_on_failure: true
          require_tests: true
